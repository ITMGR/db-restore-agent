services:
  restore-worker:
    build:
      context: .
      dockerfile: Dockerfile.restore-worker
    image: crz-opt-restore-worker:local
    container_name: crz-opt-restore-worker
    restart: unless-stopped
    profiles:
      - restore-worker
    env_file:
      - .env
    environment:
      COMPOSE_PROJECT_NAME: crz-opt
      PROJECT_DIR: ${RESTORE_WORKER_PROJECT_DIR}
      DB_HOST: crz-opt-mariadb
      DB_PORT: 3306
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      DUMP_WATCH_DIR: ${DUMP_WATCH_DIR}
      RESTORE_STATE_DIR: ${RESTORE_STATE_DIR}
      RESTORE_POLL_INTERVAL: 60
      RESTORE_STABLE_SECONDS: 120
      RESTORE_ON_START: ${RESTORE_ON_START:-true}
      RESTORE_WORKFLOW_MODE: ${RESTORE_WORKFLOW_MODE}
      RESTORE_AUTO_BACKFILL: ${RESTORE_AUTO_BACKFILL}
      RESTORE_GZIP_TEST: ${RESTORE_GZIP_TEST}
      METRICS_ENABLED: ${METRICS_ENABLED}
      METRICS_PORT: ${METRICS_PORT}
      METRICS_BASIC_AUTH_ENABLED: ${METRICS_BASIC_AUTH_ENABLED}
      METRICS_BASIC_AUTH_USERNAME: ${METRICS_BASIC_AUTH_USERNAME}
      METRICS_BASIC_AUTH_PASSWORD: ${METRICS_BASIC_AUTH_PASSWORD}
    ports:
      - "127.0.0.1:${RESTORE_WORKER_METRICS_PORT}:${METRICS_PORT}"
    working_dir: ${RESTORE_WORKER_PROJECT_DIR}
    volumes:
      #- .:${RESTORE_WORKER_PROJECT_DIR}
      #- ./scripts:/opt/crz-opt-scripts:ro
      - ./data/dumps:${RESTORE_WORKER_PROJECT_DIR}/data/dumps:ro
      - ./data/restore-state:${RESTORE_WORKER_PROJECT_DIR}/data/restore-state
      - ./data/restore-runs:${RESTORE_WORKER_PROJECT_DIR}/data/restore-runs
    networks:
      - crz-opt-net

networks:
  crz-opt-net:
    name: crz-opt-net
    external: true